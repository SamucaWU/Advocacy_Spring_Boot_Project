spring:
  application:
    name: advocacy

  datasource:
    url: jdbc:mysql://localhost:3306/advocacy
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-plataform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  main:
    lazy-initialization: false